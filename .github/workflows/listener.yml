# PulseK12 Newsletter Reply Listener
# Monitors for email replies and generates final newsletter
# Runs every 15 minutes from Friday 12pm CST through Saturday midnight CST (36 hour window)

name: Reply Listener

on:
  schedule:
    # Friday 18:00-23:59 UTC (12pm-6pm CST)
    - cron: '*/15 18-23 * * 5'
    # Saturday all day UTC (Saturday CST)
    - cron: '*/15 0-23 * * 6'
    # Sunday 00:00-05:59 UTC (Saturday 6pm-midnight CST)
    - cron: '*/15 0-5 * * 0'

  # Allow manual trigger for testing
  workflow_dispatch:

jobs:
  listen:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check for summaries file
        id: check_summaries
        run: |
          echo "Checking for summaries file..."
          echo "Current directory: $(pwd)"
          echo "Data directory contents:"
          ls -la data/ 2>/dev/null || echo "  data/ directory does not exist"
          echo ""
          if [ -f "data/latest_summaries.json" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "✓ Summaries file found"
            echo "File info:"
            ls -la data/latest_summaries.json
            echo "Generated at: $(jq -r '.generated_at // "unknown"' data/latest_summaries.json)"
            echo "Article count: $(jq -r '.count // 0' data/latest_summaries.json)"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "✗ No summaries file found at data/latest_summaries.json"
            echo "This means the weekly digest has not run yet, or failed to commit."
            echo "Check the 'Weekly Newsletter Digest' workflow for recent runs."
          fi

      - name: Run listener
        if: steps.check_summaries.outputs.exists == 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SMTP_HOST: smtp.gmail.com
          SMTP_PORT: 587
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          EMAIL_CC: ${{ secrets.EMAIL_CC }}
        run: |
          python -m src.listener

      - name: Skip notification
        if: steps.check_summaries.outputs.exists == 'false'
        run: |
          echo "::warning::No summaries file found. The weekly digest must run first to generate the menu."
          echo "::notice::To fix: Run the 'Weekly Newsletter Digest' workflow manually, or wait for Friday 12pm CST."
